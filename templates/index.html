<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IconSole - Главная</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="background"></div>
<div id="fireflies"></div>
<div id="cursor-glow"></div>

<!-- ===================== -->
<!-- PC / TV SCREEN -->
<!-- ===================== -->
<div id="pc-screen">
    <div class="top">
        <div class="logo">◉ IconSole</div>
    </div>

    <div id="connect-pc-container" class="center">
        <button id="connectBtn">Создать комнату</button>
    </div>

    <div id="game-hero" class="game-hero">
        <div class="game-video">
            <video autoplay muted loop playsinline id="heroVideo">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-space-game-background-2356-large.mp4" type="video/mp4">
            </video>
        </div>
        <div class="game-info">
            <span class="tag">Новинка</span>
            <h2>Space Arena Online</h2>
            <p>Космические PvP бои с друзьями через телефон. Быстрые матчи, хаотичные арены и динамика.</p>
            <button class="play-btn" id="heroPlayBtn">Играть</button>
        </div>
    </div>
</div>

<script src="/static/main.js"></script>
</body>
</html>
