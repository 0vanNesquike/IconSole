<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IconSole — игры</title>
<link rel="stylesheet" href="../static/style.css">
</head>
<body>

<div class="background"></div>
<div id="fireflies"></div>
<div id="cursor-glow"></div>

<div id="game-lobby">
    <div class="lobby-header">
        <div class="logo">◉ IconSole</div>
        <div class="room-info-wrapper">
            <button id="room-info-btn" class="room-info-btn">👥 В комнате: <span id="lobby-player-count">0</span></button>
            <div id="room-info-tooltip" class="room-info-tooltip hidden">
                <img id="lobby-qr" class="tooltip-qr"/>
                <div class="tooltip-code" id="lobby-code">---</div>
                <p>QR для подключения</p>
            </div>
        </div>
    </div>

    <div class="featured-game">
        <div class="featured-info">
            <span class="featured-tag" id="featured-tag">Актуальное</span>
            <h1 id="featured-title">Space Arena Online</h1>
            <p id="featured-description">Космические PvP бои с друзьями через телефон. Быстрые матчи, хаотичные арены и динамика.</p>
            <button class="featured-play-btn" id="featured-play-btn">Играть сейчас</button>
        </div>
        <div class="featured-video">
            <video autoplay muted loop playsinline id="featured-video">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-space-game-background-2356-large.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="single-category">
        <div class="category-title">Бесплатные игры</div>
        <div class="games-horizontal" id="games-container"></div>
    </div>
</div>

<script src="../static/room.js"></script>
</body>
</html>
